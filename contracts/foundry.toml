[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
via_ir = true
solc = "0.8.22"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
celo = "${CELO_RPC_URL}"
alfajores = "${ALFAJORES_RPC_URL}"

[etherscan]
celo = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api", chain = 42220 }
alfajores = { key = "${CELOSCAN_API_KEY}", url = "https://api-alfajores.celoscan.io/api", chain = 44787 }
